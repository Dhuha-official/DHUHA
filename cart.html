<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Cart | DHUHA</title>


<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">

</head>


<body>


<header>

<div class="logo">
DHUHA
</div>


<div class="header-right">

<a href="cart.html" class="icon">

<span class="material-symbols-outlined">
shopping_bag
</span>

</a>


<a href="login.html" class="icon">

<span class="material-symbols-outlined">
person
</span>

</a>

</div>

</header>




<section class="cart-page">


<h1>
SHOPPING BAG
</h1>



<div class="cart-item">

    <div id="cartProduct"></div>

</div>



<div class="cart-total">


<h2>
TOTAL
</h2>


<h3 id="cartTotal">
</h3>



<a href="checkout.html" class="checkout-btn">

CHECKOUT

</a>


</div>



</section>




<script>


let name = localStorage.getItem("cartProduct");

let price = localStorage.getItem("cartPrice");

let image = localStorage.getItem("cartImage");



document.getElementById("cartProduct").innerHTML = `


<img src="${image}">


<div>

<h3>
${name}
</h3>


<p>
Rp${Number(price).toLocaleString()}
</p>



<div class="quantity">

<button>
-
</button>


<span>
1
</span>


<button>
+
</button>

</div>


</div>


`;



document.getElementById("cartTotal").innerHTML =

"Rp" + Number(price).toLocaleString();



</script>



</body>

</html>
