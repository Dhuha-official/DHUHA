<script>

let name = localStorage.getItem("cartProduct") || "Produk DHUHA";

let price = Number(localStorage.getItem("cartPrice")) || 0;

let image = localStorage.getItem("cartImage") || "assets/images/product1.png";


let qty = 1;



const cartProduct = document.getElementById("cartProduct");

const cartTotal = document.getElementById("cartTotal");



cartProduct.innerHTML = `

<img src="${image}">


<div>

<h3>
${name}
</h3>


<p>
Rp${price.toLocaleString()}
</p>



<div class="quantity">

<button onclick="minus()">
-
</button>


<span id="qty">
1
</span>


<button onclick="plus()">
+
</button>


</div>


</div>

`;



function updateCart(){

document.getElementById("qty").innerHTML = qty;


let total = price * qty;


cartTotal.innerHTML =
"Rp" + total.toLocaleString();

}



function plus(){

qty++;

updateCart();

}



function minus(){

if(qty > 1){

qty--;

}

updateCart();

}



updateCart();

<div id="cartProduct"></div>
  <h3 id="cartTotal"></h3>
  
</script>
