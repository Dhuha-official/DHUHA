</head>


<body>


<header>

<div class="logo">
DHUHA
</div>


<div class="header-right">

<a href="cart.html" class="icon">

shopping_bag

<header>

<div class="logo">
DHUHA
</div>


<div class="header-right">


<a href="cart.html" class="icon">

<span class="material-symbols-outlined">
shopping_bag
</span>

</a>




<div class="profile-menu">


<button class="profile-btn">


<span class="material-symbols-outlined">
person
</span>


<span id="username"></span>


</button>




<div class="dropdown" id="profileMenu">


<a href="login.html">
Masuk
</a>


<a href="register.html">
Daftar
</a>


</div>


</div>



</div>


</header>

</div>

</header>




<section class="cart-page">


<h1>
SHOPPING BAG
</h1>



<div class="cart-item">

    <div id="cartProduct"></div>

</div>



<div class="cart-total">


<h2>
TOTAL
</h2>


<h3 id="cartTotal">
Rp0
</h3>



<a href="checkout.html" class="checkout-btn">

CHECKOUT

</a>


</div>



</section>





<script>

let name = localStorage.getItem("cartProduct") || "Produk DHUHA";

let price = Number(localStorage.getItem("cartPrice")) || 0;

let image = localStorage.getItem("cartImage") || "assets/images/product1.png";


let qty = 1;



const cartProduct = document.getElementById("cartProduct");

const cartTotal = document.getElementById("cartTotal");



cartProduct.innerHTML = `

<img src="${image}">


<div>

<h3>
${name}
</h3>


<p>
Rp${price.toLocaleString()}
</p>



<div class="quantity">


<button onclick="minus()">
-
</button>


<span id="qty">
1
</span>


<button onclick="plus()">
+
</button>


</div>


</div>

`;




function updateCart(){


document.getElementById("qty").innerHTML = qty;


let total = price * qty;


cartTotal.innerHTML =
"Rp" + total.toLocaleString();


}




function plus(){

qty++;

updateCart();

}




function minus(){

if(qty > 1){

qty--;

}

updateCart();

}



updateCart();



</script>

<script>

let user = localStorage.getItem("user");


let menu = document.getElementById("profileMenu");

let username = document.getElementById("username");



if(user && menu && username){


username.innerHTML = user;



menu.innerHTML = `


<a href="account.html">
Pengaturan
</a>


<a href="orders.html">
Pesanan
</a>


<a href="wishlist.html">
Wishlist
</a>


<a href="#" onclick="logout()">
Logout
</a>


`;

}




function logout(){

localStorage.removeItem("user");

window.location.href="login.html";

}


</script>

</body>

</html>
