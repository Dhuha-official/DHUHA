<script>

let name = localStorage.getItem("cartProduct");
let price = localStorage.getItem("cartPrice");
let image = localStorage.getItem("cartImage");

let qty = 1;



document.getElementById("cartProduct").innerHTML = `

<img src="${image}">


<div>

<h3>
${name}
</h3>


<p>
Rp${Number(price).toLocaleString()}
</p>



<div class="quantity">

<button onclick="minus()">
-
</button>


<span id="qty">
1
</span>


<button onclick="plus()">
+
</button>


</div>


</div>

`;



function updateCart(){

document.getElementById("qty").innerHTML = qty;


let total = Number(price) * qty;


document.getElementById("cartTotal").innerHTML =
"Rp" + total.toLocaleString();

}



function plus(){

qty++;

updateCart();

}



function minus(){

if(qty > 1){

qty--;

}

updateCart();

}



updateCart();


</script>
