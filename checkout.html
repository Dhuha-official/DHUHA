<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | DHUHA</title>

<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">

</head>


<body>


<header>

<div class="logo">
DHUHA
</div>


</header>




<section class="checkout-page">


<h1>
CHECKOUT
</h1>



<div class="checkout-box">



<h2>
Alamat Pengiriman
</h2>


<input type="text" placeholder="Nama Lengkap">


<input type="text" placeholder="Nomor WhatsApp">


<textarea placeholder="Alamat Lengkap"></textarea>



<h2>
Metode Pembayaran
</h2>


<label>

<input type="radio" name="payment">

Transfer Bank

</label>


<label>

<input type="radio" name="payment">

COD

</label>




<div class="order-summary">


<h2>
Ringkasan Pesanan
</h2>


<div id="checkoutProduct">

</div>


<h3 id="checkoutTotal">

</h3>


</div>



<button class="checkout-btn">

BUAT PESANAN

</button>



</div>


</section>




<script>

let name = localStorage.getItem("cartProduct");

let price = localStorage.getItem("cartPrice");

let image = localStorage.getItem("cartImage");



document.getElementById("checkoutProduct").innerHTML = `


<p>${name}</p>

<p>
Rp${Number(price).toLocaleString()}
</p>


`;



document.getElementById("checkoutTotal").innerHTML =

"Total : Rp" + Number(price).toLocaleString();



</script>



</body>

</html>
