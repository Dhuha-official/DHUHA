<!DOCTYPE html>
<html lang="id">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Checkout | DHUHA</title>



<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">



<link rel="stylesheet" href="assets/css/style.css">


</head>




<body>




<header id="header">


<div class="logo">

DHUHA

</div>


</header>
<section class="checkout-page">


<div class="section-title">


<h2>
CHECKOUT
</h2>


</div>





<div class="checkout-box">


<h2>
Data Pengiriman
</h2>




<input type="text" id="customerName" placeholder="Nama Lengkap">



<input type="text" id="phone" placeholder="Nomor WhatsApp">



<textarea id="address" placeholder="Alamat Lengkap"></textarea>





<h2>
Metode Pembayaran
</h2>




<label>

<input type="radio" name="payment" value="Transfer Bank">

Transfer Bank

</label>



<br>



<label>

<input type="radio" name="payment" value="COD">

COD

</label>





<div class="order-summary">


<h2>
Pesanan
</h2>



<div id="checkoutProduct">

</div>



<h3 id="checkoutTotal">

</h3>



</div>




<button class="checkout-btn" onclick="createOrder()">

BUAT PESANAN

</button>



</div>



</section>
<script src="assets/js/main.js"></script>

<script src="assets/js/checkout.js"></script>



</body>

</html>
