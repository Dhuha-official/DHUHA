<!DOCTYPE html>
<html lang="id">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Checkout | DHUHA</title>


<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="assets/css/style.css">

</head>


<body>


<header>

<div class="logo">
DHUHA
</div>

</header>




<section class="checkout-page">


<h1>
CHECKOUT
</h1>



<div class="checkout-box">



<h2>
Data Pengiriman
</h2>


<input type="text" placeholder="Nama Lengkap">


<input type="text" placeholder="Nomor WhatsApp">


<textarea placeholder="Alamat Lengkap"></textarea>




<h2>
Metode Pembayaran
</h2>


<label>

<input type="radio" name="payment">

Transfer Bank

</label>


<br>


<label>

<input type="radio" name="payment">

COD

</label>





<div class="order-summary">


<h2>
Pesanan
</h2>


<div id="checkoutProduct"></div>


<h3 id="checkoutTotal">
</h3>


</div>




<button class="checkout-btn" onclick="createOrder()">

BUAT PESANAN

</button>



</div>


</section>





<script>


let name = localStorage.getItem("cartProduct") || "Produk DHUHA";


let price = Number(localStorage.getItem("cartPrice")) || 0;


let image = localStorage.getItem("cartImage") || "assets/images/product1.png";



document.getElementById("checkoutProduct").innerHTML = `


<img src="${image}" width="120">


<h3>
${name}
</h3>


<p>
Rp${price.toLocaleString()}
</p>


`;



document.getElementById("checkoutTotal").innerHTML =

"Total : Rp" + price.toLocaleString();

function createOrder(){

localStorage.setItem(
"orderStatus",
"Pesanan berhasil dibuat"
);


window.location.href="success.html";


}

</script>

<script>

let user = localStorage.getItem("user");


let menu = document.getElementById("profileMenu");

let username = document.getElementById("username");



if(user && menu && username){


username.innerHTML = user;



menu.innerHTML = `


<a href="account.html">
Pengaturan
</a>


<a href="orders.html">
Pesanan
</a>


<a href="wishlist.html">
Wishlist
</a>


<a href="#" onclick="logout()">
Logout
</a>


`;

}




function logout(){

localStorage.removeItem("user");

window.location.href="login.html";

}


</script>

</body>

</html>
