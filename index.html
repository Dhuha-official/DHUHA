<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>DHUHA Official</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">

    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>

<header>

    <div class="logo">
        DHUHA
    </div>

    <div class="header-right">

        <a href="#" class="icon">
            <span class="material-symbols-outlined">search</span>
        </a>

        <a href="cart.html" class="icon cart-icon">
            <span class="material-symbols-outlined">shopping_bag</span>
            <span class="cart-count">0</span>
        </a>

        <div class="profile-menu">

            <button class="profile-btn">

                <span class="material-symbols-outlined">
                    person
                </span>

            </button>

            <div class="dropdown">

                <a href="login.html">Masuk</a>

                <a href="register.html">Daftar</a>

            </div>

        </div>

    </div>

</header>

<section class="hero">

    <div class="overlay"></div>

    <div class="hero-content">

        <h1>BUILT WITH FAITH</h1>

        <p>Premium Clothing From Indonesia</p>

        <a href="shop.html" class="btn">
            SHOP NOW
        </a>

    </div>

</section>
<section class="new-collection">

    <div class="section-title">
        <h2>NEW COLLECTION</h2>
    </div>

    <div class="slider-container">

        <div class="slider-track">

            <div class="slide-card">
                <img src="assets/images/product1.png">
                <h3>Built With Faith Oversize</h3>
            </div>

            <div class="slide-card">
                <img src="assets/images/product2.png">
                <h3>Iconic DHUHA Polo</h3>
            </div>

            <div class="slide-card">
                <img src="assets/images/product3.png">
                <h3>DHUHA Lifestyle Jersey</h3>
            </div>

            <div class="slide-card">
                <img src="assets/images/product4.png">
                <h3>Heritage Collection</h3>
            </div>

        </div>

    </div>

</section>
<script>

const products=[

{
name:"Oversize Built With Faith",
image:"assets/images/product1.png"
},

{
name:"Premium Polo",
image:"assets/images/product2.png"
},

{
name:"Lifestyle Jersey",
image:"assets/images/product3.png"
},

{
name:"Heritage Oversize",
image:"assets/images/product4.png"
}

];

const container=document.getElementById("newCollection");

products.forEach(item=>{

container.innerHTML+=`

<div class="product-card">

<img src="${item.image}">

<div class="product-info">

<div class="product-name">${item.name}</div>

<div class="product-price">${item.price}</div>

</div>

</div>

`;

});

    </script>
    
</body>
</html>
