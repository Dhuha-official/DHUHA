<!DOCTYPE html>
<html lang="id">


<head>


<meta charset="UTF-8">


<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>Account | DHUHA</title>



<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">



<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">



<link rel="stylesheet" href="assets/css/style.css">



</head>




<body>



<header id="header">


<div class="logo">

DHUHA

</div>


</header>
<section class="checkout-page">


<div class="checkout-box">



<div class="section-title">


<h2>

MY ACCOUNT

</h2>


</div>





<div class="order-summary">



<span class="material-symbols-outlined">

person

</span>




<h3 id="accountName">

</h3>




<p id="accountEmail">

</p>



</div>




<a href="index.html" class="checkout-btn">

KEMBALI KE BERANDA

</a>



<button class="checkout-btn" onclick="logout()">

LOGOUT

</button>



</div>



</section>
<script src="assets/js/main.js"></script>


<script>


let name = localStorage.getItem("user") || "User";


let email = localStorage.getItem("userEmail") || "-";



document.getElementById("accountName").innerHTML = name;


document.getElementById("accountEmail").innerHTML = email;




function logout(){


localStorage.removeItem("user");


localStorage.removeItem("userEmail");


window.location.href="login.html";


}



</script>




</body>

</html>
